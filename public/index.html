<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Concert Check-In</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e8e8e8;
      --text: #111111;
      --muted: #888888;
      --green: #16a34a;
      --red: #dc2626;
      --gold: #b45309;
      --gold-bg: #fef3c7;
      --radius: 16px;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* ── Content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      display: none;
      height: 100%;
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════ SCAN PAGE ═══════════════════ */
    #page-scan {
      align-items: stretch;
      padding: 20px;
      gap: 16px;
    }

    #cam-placeholder {
      aspect-ratio: 1/1;
      border-radius: 20px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed var(--border);
    }

    #cam-placeholder svg {
      opacity: 0.2;
    }

    #cam-placeholder p {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #qr-reader {
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 1/1;
      flex-shrink: 0;
    }

    #qr-reader>div {
      border-radius: 20px !important;
    }

    #qr-reader video {
      border-radius: 20px !important;
      object-fit: cover;
      width: 100% !important;
      height: 100% !important;
    }

    #qr-reader img {
      display: none !important;
    }

    #scan-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      background: #111;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    #scan-btn:active {
      opacity: 0.8;
    }

    #scan-btn.danger {
      background: #fee2e2;
      color: var(--red);
    }

    /* ═══════════════════ LOG PAGE ═══════════════════ */
    #page-log {
      padding: 20px;
      gap: 14px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .log-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .btn-refresh {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
    }

    #entries-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
      border-radius: 12px;
      overflow: hidden;
    }

    .entry-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      background: var(--surface);
      gap: 10px;
    }

    .entry-row:first-child {
      border-radius: 12px 12px 0 0;
    }

    .entry-row:last-child {
      border-radius: 0 0 12px 12px;
    }

    .entry-row:only-child {
      border-radius: 12px;
    }

    .entry-row .e-name {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .entry-row .e-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .entry-row .e-time {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Empty / loading ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Bottom nav ── */
    #bottom-nav {
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 0 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn.active {
      color: var(--text);
    }

    .nav-btn svg {
      width: 22px;
      height: 22px;
    }

    .nav-btn.active svg path,
    .nav-btn.active svg rect,
    .nav-btn.active svg circle {
      stroke: var(--text) !important;
    }

    /* ═══════════════════ RESULT SHEET ═══════════════════ */
    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.45);
      align-items: flex-end;
      justify-content: center;
    }

    #result-overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #result-sheet {
      background: var(--bg);
      width: 100%;
      max-width: 430px;
      border-radius: 24px 24px 0 0;
      padding: 12px 24px 44px;
      animation: slideUp 0.28s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* Pass badge — big, prominent */
    .pass-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 10px 0;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .pass-badge.aaa {
      background: var(--gold-bg);
      color: var(--gold);
    }

    .pass-badge.a {
      background: #dcfce7;
      color: var(--green);
    }

    .pass-badge.denied {
      background: #fee2e2;
      color: var(--red);
    }

    .res-name {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }

    .res-sub {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 18px;
    }

    .info-rows {
      display: flex;
      flex-direction: column;
      gap: 1px;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: var(--surface);
      font-size: 0.88rem;
    }

    .info-row .lbl {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .info-row .val {
      font-weight: 600;
    }

    /* Confirm / close buttons */
    .btn-allow {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: var(--green);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .btn-allow.gold {
      background: var(--gold);
    }

    .btn-allow:active {
      opacity: 0.85;
    }

    .btn-allow:disabled {
      opacity: 0.4;
    }

    .btn-close {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111;
      color: #fff;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      white-space: nowrap;
      max-width: 90%;
      text-align: center;
      z-index: 500;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <div id="app">

    <div id="topbar">
      <h1>Concert Check-In</h1>
    </div>

    <div id="content">

      <!-- ── SCAN PAGE ── -->
      <div class="page active" id="page-scan">
        <div id="cam-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <path d="M14 14h1m4 0h1m-5 4h5m0-4v5" />
          </svg>
          <p>Tap below to open camera</p>
        </div>
        <div id="qr-reader" style="display:none"></div>

        <button id="scan-btn" onclick="toggleScanner()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M23 4v2h-3a2 2 0 0 0-2 2v2h-2V8a4 4 0 0 1 4-4h3z" />
            <path d="M1 20v-2h3a2 2 0 0 0 2-2v-2h2v2a4 4 0 0 1-4 4H1z" />
            <path d="M23 20v-2h-3a2 2 0 0 1-2-2v-2h-2v2a4 4 0 0 0 4 4h3z" />
            <path d="M1 4v2h3a2 2 0 0 1 2 2v2h2V8a4 4 0 0 0-4-4H1z" />
          </svg>
          Start Scanning
        </button>
      </div>

      <!-- ── LOG PAGE ── -->
      <div class="page" id="page-log">
        <div class="log-header">
          <h2>Entry Log</h2>
          <button class="btn-refresh" onclick="loadLog()">Refresh</button>
        </div>
        <div id="entries-list">
          <div class="empty">
            <p>Tap refresh to load</p>
          </div>
        </div>
      </div>

    </div><!-- /content -->

    <nav id="bottom-nav">
      <button class="nav-btn active" id="nav-scan" onclick="goTo('scan')">
        <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <path d="M14 14h2v2m0 4h4v-4m-4 0h-2" />
        </svg>
        Scan
      </button>
      <button class="nav-btn" id="nav-log" onclick="goTo('log')">
        <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
          <rect x="9" y="3" width="6" height="4" rx="1" />
          <path d="M9 12h6m-6 4h4" />
        </svg>
        Log
      </button>
    </nav>

  </div><!-- /app -->

  <!-- ── RESULT SHEET ── -->
  <div id="result-overlay" onclick="closeResult()">
    <div id="result-sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="pass-badge" id="res-badge"></div>
      <div class="res-name" id="res-name"></div>
      <div class="res-sub" id="res-sub"></div>
      <div class="info-rows" id="res-info"></div>
      <button id="res-confirm" class="btn-allow" onclick="confirmEntry()" style="display:none">
        Allow Entry
      </button>
      <button class="btn-close" onclick="closeResult()">Done</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ── Navigation ─────────────────────────────────────────
    function goTo(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.getElementById('nav-' + page).classList.add('active');
      if (page === 'log') loadLog();
    }

    // ── Scanner ────────────────────────────────────────────
    let scanner = null, scanning = false, processing = false;

    async function toggleScanner() {
      if (!scanning) await startScanner();
      else await stopScanner();
    }

    async function startScanner() {
      const btn = document.getElementById('scan-btn');
      btn.textContent = 'Starting…';
      try {
        scanner = new Html5Qrcode('qr-reader');
        await scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          onQr, () => { }
        );
        scanning = true;
        document.getElementById('cam-placeholder').style.display = 'none';
        document.getElementById('qr-reader').style.display = 'block';
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> Stop Scanning`;
        btn.classList.add('danger');
      } catch (e) {
        toast('Camera error: ' + e);
        btn.textContent = 'Start Scanning';
      }
    }

    async function stopScanner() {
      if (!scanner) return;
      try { await scanner.stop(); } catch (_) { }
      scanning = false;
      document.getElementById('cam-placeholder').style.display = 'flex';
      document.getElementById('qr-reader').style.display = 'none';
      const btn = document.getElementById('scan-btn');
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 4v2h-3a2 2 0 0 0-2 2v2h-2V8a4 4 0 0 1 4-4h3z"/><path d="M1 20v-2h3a2 2 0 0 0 2-2v-2h2v2a4 4 0 0 1-4 4H1z"/><path d="M23 20v-2h-3a2 2 0 0 1-2-2v-2h-2v2a4 4 0 0 0 4 4h3z"/><path d="M1 4v2h3a2 2 0 0 1 2 2v2h2V8a4 4 0 0 0-4-4H1z"/></svg> Start Scanning`;
      btn.classList.remove('danger');
    }

    async function onQr(code) {
      if (processing) return;
      processing = true;
      try { scanner.pause(); } catch (_) { }

      try {
        const res = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrCode: code }),
        });
        showResult(await res.json());
      } catch (_) {
        showResult({ success: false, status: 'ERROR', message: 'Network error — is the server running?' });
      }
    }


    // ── Result sheet ───────────────────────────────────────
    function showResult(data) {
      const badge = document.getElementById('res-badge');
      const name = document.getElementById('res-name');
      const sub = document.getElementById('res-sub');

      if (data.success && data.status === 'ENTERED') {
        badge.textContent = '✅';
        badge.className = 'pass-badge a';
        name.textContent = data.participantId;
        sub.textContent = 'Entry saved';

      } else if (data.status === 'DUPLICATE') {
        badge.textContent = '⚠️';
        badge.className = 'pass-badge a';
        name.textContent = data.participantId || 'Already Scanned';
        sub.textContent = data.message || '';

      } else if (data.status === 'INVALID_QR') {
        badge.textContent = '🚫';
        badge.className = 'pass-badge denied';
        name.textContent = 'Invalid QR';
        sub.textContent = data.message || '';

      } else {
        badge.textContent = '⚠️';
        badge.className = 'pass-badge denied';
        name.textContent = 'Error';
        sub.textContent = data.message || 'Something went wrong';
      }

      document.getElementById('res-info').innerHTML = '';
      document.getElementById('res-confirm').style.display = 'none';
      document.getElementById('result-overlay').classList.add('show');
    }


    function closeResult() {
      document.getElementById('result-overlay').classList.remove('show');
      processing = false;
      if (scanning) try { scanner.resume(); } catch (_) { }
    }

    // ── Entry log ──────────────────────────────────────────
    async function loadLog() {
      const list = document.getElementById('entries-list');
      list.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
      try {
        const d = await (await fetch('/api/entries')).json();
        if (!d.entries?.length) {
          list.innerHTML = '<div class="empty"><p>No entries yet</p></div>';
          return;
        }
        list.innerHTML = '';
        d.entries.forEach(e => {
          const t = new Date(e.createdAt);
          const div = document.createElement('div');
          div.className = 'entry-row';
          div.innerHTML = `
            <div>
              <div class="e-name">${e.participantId}</div>
            </div>
            <div class="e-time">
              ${t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}<br>
              <span style="font-size:0.65rem">${t.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}</span>
            </div>`;
          list.appendChild(div);
        });
      } catch (_) {
        list.innerHTML = '<div class="empty"><p>Failed to load</p></div>';
      }
    }

    // ── Toast ──────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }
  </script>
</body>

</html>
